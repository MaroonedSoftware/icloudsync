# Lint + test gate, then build and publish the multi-arch container image to GHCR.
#
# The `test` job runs the full workspace lint and test suite (the API's
# integration tests exercise a real Postgres service). `build` only runs once
# `test` passes, so a broken commit never publishes an image. Pull requests run
# the same gate and a no-push image build to validate the Dockerfile.
#
# Unraid (and any registry-based deploy) pulls a prebuilt image rather than
# building from source, so every push to main and every version tag produces
# linux/amd64 + linux/arm64 images at ghcr.io/maroonedsoftware/icloudsync.
name: CI

on:
    push:
        branches: [main]
        tags: ['v*']
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            # The API integration tests (and the migration step) connect here;
            # matches the in-repo default so no test needs overriding.
            DATABASE_URL: postgres://postgres:postgres@localhost:5432/icloudsync?sslmode=disable
            # A dummy secret so encryption-backed services can initialize in tests.
            ICLOUD_ENCRYPTION_SECRET: ci-test-secret-do-not-use-in-prod
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: icloudsync
                ports:
                    - 5432:5432
                # Hold the job's steps until Postgres is accepting connections.
                options: >-
                    --health-cmd "pg_isready -U postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up pnpm
              # Version is read from the `packageManager` field in package.json.
              uses: pnpm/action-setup@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run database migrations
              run: pnpm --filter @icloudsync/api migrate:up

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

    build:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              # Enables cross-building the arm64 image on the amd64 runner.
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              # PRs from forks can't push; skip login when we won't publish.
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Derive tags and labels
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
                  # `latest` tracks the default branch; version tags (v1.2.3) also
                  # publish 1.2.3 and 1.2; every build is addressable by commit SHA.
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  # Only publish on real refs; a PR build validates without pushing.
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
