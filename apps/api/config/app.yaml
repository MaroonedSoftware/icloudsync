# Layered application config. Values are `${env:VAR}` placeholders resolved at
# load time by @maroonedsoftware/appconfig's AppConfigResolverEnv (see
# src/modules/config/app.config.ts). This file is the single source of truth for
# which environment variables configure the app; per-module classes
# (ICloudConfig, HttpConfig) validate their section with zod and apply defaults.
#
# A missing variable resolves to an empty string, which each section treats as
# "unset" so its default (or required-field error) applies.
# User-facing settings (account, photo layout, sync schedule) are NOT here —
# they live in the database (app_settings) and are edited via the UI/API. Only
# secrets and infra that must exist before the DB is reachable belong in env.
icloud:
  photosDir: "${env:ICLOUD_PHOTOS_DIR}"
  encryptionSecret: "${env:ICLOUD_ENCRYPTION_SECRET}"
  encryptionSalt: "${env:ICLOUD_ENCRYPTION_SALT}"
  # Max size (MiB) of the on-disk recent-backups thumbnail cache. Default: 10.
  # Set to 0 to disable thumbnails entirely (no derived renditions are served or
  # cached, and the UI hides the recent-backups grid).
  thumbnailCacheMaxMb: "${env:THUMBNAIL_CACHE_MAX_MB}"
http:
  port: "${env:PORT}"
database:
  url: "${env:DATABASE_URL}"
web:
  # Directory of the built SPA (apps/web/dist) to serve. Unset = API only.
  root: "${env:WEB_ROOT}"
logging:
  # Rotating file log (api.log + api.log.1..N). Captures uncaught exceptions and
  # unhandled rejections so a crash leaves a durable reason on disk.
  # Directory for the log files. Default: ./logs (relative to the process cwd).
  dir: "${env:LOG_DIR}"
  # Lowest level to persist: error | warn | info | debug | trace. Default: info
  level: "${env:LOG_LEVEL}"
  # Roll the active file over once it passes this many megabytes. Default: 5
  maxSizeMb: "${env:LOG_MAX_SIZE_MB}"
  # How many files to keep, including the active one. Default: 5
  maxFiles: "${env:LOG_MAX_FILES}"
