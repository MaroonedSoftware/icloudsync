# Self-hosted iCloud Sync: the combined API+worker+UI container plus Postgres.
# Copy .env.example to .env and set a strong encryption secret, then
# `docker compose up --build`. The UI is on http://localhost:8930 — sign in and
# pick your settings there. The encrypted session lives in Postgres, so the
# persistent volumes are the database, the backed-up photo files, and the logs.
services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: icloudsync
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d icloudsync']
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DATABASE_URL: postgres://postgres:postgres@postgres:5432/icloudsync?sslmode=disable
            ICLOUD_ENCRYPTION_SECRET: ${ICLOUD_ENCRYPTION_SECRET}
            # Where the backed-up photo files are written (persisted on a volume).
            ICLOUD_PHOTOS_DIR: /data/photos
            # Rotating crash/diagnostic log, on its own volume so it survives the
            # container restarts it exists to explain.
            LOG_DIR: /data/logs
            # Account, photo layout, sync schedule, and the encrypted session all
            # live in the database — configured in the web UI, not via env vars.
        volumes:
            - photos_data:/data/photos
            - logs_data:/data/logs
        ports:
            - '8930:8930'
        restart: unless-stopped

volumes:
    pgdata:
    photos_data:
    logs_data:
